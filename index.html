<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DgWeb Dev - Hollow Knight Save Modder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <header>
            <h1>Hollow Knight Save Modder</h1>
            <p class="brand">Desenvolvido por <a href="https://github.com/DGWEB-SCRIPTS" target="_blank">DgWeb Dev</a></p>
        </header>
        
        <section class="upload-section">
            <label for="fileInput" class="custom-file-upload">
                📁 Selecionar Save (user1.dat)
            </label>
            <input type="file" id="fileInput" accept=".dat" />
            <p id="status">Aguardando importação do arquivo...</p>
        </section>

        <div id="editorBox" class="hidden">
            <div class="preset-container">
                <h3>Painel de Controle (Presets)</h3>
                <div class="grid-botoes">
                    <button class="btn-preset" id="btnAmuletos">📿 Todos os Amuletos</button>
                    <button class="btn-preset" id="btnHabilidades">✨ Todas Habilidades</button>
                    <button class="btn-preset" id="btnHitKill">🗡️ Hit Kill</button>
                    <button class="btn-preset" id="btnVida">❤️ Vida Máxima</button>
                    <button class="btn-preset" id="btnDinheiro">💰 Geo Infinito</button>
                </div>
            </div>

            <div class="manual-section">
                <h3>Editor Manual (JSON)</h3>
                <p style="font-size: 0.8rem; color: #8b949e; margin-bottom: 10px;">
                    Os botões acima modificam o código abaixo em tempo real.
                </p>
                <textarea id="manualEditor" spellcheck="false"></textarea>
            </div>

            <div class="download-section">
                <button class="btn-down text" id="btnDownTexto">📄 Baixar Texto Puro (.txt)</button>
                <button class="btn-down crypt" id="btnDownJogo">💾 Baixar para o Jogo (.dat)</button>
            </div>
        </div>
        
        <footer>
            &copy; 2026 DgWeb Dev. Todos os direitos reservados.
        </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
